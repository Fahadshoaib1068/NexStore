<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStore | Login</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<!-- Animated Background -->
<div class="background">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

</div>

<div class="auth-container">
    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-header">
            <div class="logo">
                <div class="logo-circle">
                    <i class="fa-solid fa-store"></i>
                </div>
                <h1>NexStore</h1>
            </div>
            <h2 id="auth-title">Welcome Back</h2>
            <p
                    id="auth-subtitle">Sign in to continue shopping.
            </p>
        </div>
        <form id="login-form" class="auth-form active">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="login-username" placeholder="Username" required>
            </div>
            <div class="input-group password-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="login-password" placeholder="Password" required>
                <span class="toggle-password">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>
            <div class="form-options">
                <label>
                    <input type="checkbox">Remember Me
                </label>
                <a href="#">Forgot Password?</a>
            </div>
            <button class="auth-btn" type="submit">
                <span
                        class="btn-text">Login
                </span>
                <span class="loader"></span>
            </button>
            <p class="auth-switch">
                Don't have an account?<a href="#" id="show-register">Create One</a>
            </p>
        </form>

        <form id="register-form" class="auth-form hidden">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="reg-username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="reg-email" placeholder="Email Address" required>
            </div>
            <div class="input-group password-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="reg-password" placeholder="Password" required>
                <span class="toggle-password"><i class="fa-solid fa-eye"></i></span>
            </div>
            <button class="auth-btn" type="submit">
                <span class="btn-text">Create Account</span>
                <span class="loader"></span>
            </button>
            <p class="auth-switch">Already have an account?<a href="#" id="show-login">Login</a>
            </p>
        </form>
        <div id="auth-message" class="message"></div>
    </div>
</div>
<script src="login.js"></script>
</body>
</html>
